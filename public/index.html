<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Conversor de Imagens</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Conversor de Imagens</h1>

        <input
            type="file"
            id="image"
            accept="image/*">

        <select id="size">

            <option value="5">
                5 KB
            </option>

            <option value="10">
                10 KB
            </option>

            <option value="15">
                15 KB
            </option>

        </select>

        <button id="btnConverter">
            Converter
        </button>

        <button
            id="btnBaixar"
            disabled>
            Baixar
        </button>

        <p id="status"></p>

        <img
            id="preview"
            style="display:none;">

    </div>

    <script src="script.js"></script>

</body>
</html>
